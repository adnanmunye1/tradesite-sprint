<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">TradeSite Sprint</title>
  <desc id="desc">48-hour lead page rescue for UK trades and local-service firms</desc>
  <defs>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M60 0H0v60" fill="none" stroke="#d5e0dc" stroke-opacity=".09"/>
    </pattern>
    <radialGradient id="glow" cx="100%" cy="0%" r="75%">
      <stop offset="0" stop-color="#c9ff68" stop-opacity=".26"/>
      <stop offset="1" stop-color="#c9ff68" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="#071a17"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <g transform="translate(84 76)">
    <circle cx="25" cy="25" r="24" fill="none" stroke="#6b837d" stroke-width="2"/>
    <path d="m9 35 13-18 11 11 10-15" fill="none" stroke="#c9ff68" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="68" y="34" fill="#ffffff" font-family="Arial, sans-serif" font-size="30" font-weight="600">TradeSite <tspan fill="#c9ff68" font-weight="800">Sprint</tspan></text>
  </g>
  <text x="84" y="255" fill="#ffffff" font-family="Arial, sans-serif" font-size="82" font-weight="750" letter-spacing="-4">Make the next step</text>
  <text x="84" y="344" fill="#c9ff68" font-family="Georgia, serif" font-size="90" font-style="italic">impossible to miss.</text>
  <text x="84" y="430" fill="#a8b7b2" font-family="Arial, sans-serif" font-size="27">48-hour lead page rescue for UK trades and local-service firms.</text>
  <g transform="translate(84 492)">
    <rect width="209" height="60" rx="8" fill="#c9ff68"/>
    <text x="28" y="39" fill="#071a17" font-family="Arial, sans-serif" font-size="22" font-weight="800">£400 FIXED  ↗</text>
    <text x="245" y="38" fill="#ffffff" font-family="Arial, sans-serif" font-size="21" font-weight="700">Staging in 48 hours</text>
  </g>
</svg>
